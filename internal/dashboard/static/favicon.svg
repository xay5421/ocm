<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ocm: a local node tunneled to a remote node -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#171a21" stroke="#2a2f3d" stroke-width="2"/>
  <!-- tunnel -->
  <path d="M20 44 C 20 30, 44 34, 44 20" fill="none" stroke="#6ea8fe" stroke-width="5" stroke-linecap="round"/>
  <!-- local node (green = healthy) -->
  <circle cx="20" cy="44" r="8" fill="#3fb950"/>
  <circle cx="20" cy="44" r="8" fill="none" stroke="#0f1115" stroke-width="2"/>
  <!-- remote node (blue = accent) -->
  <circle cx="44" cy="20" r="8" fill="#6ea8fe"/>
  <circle cx="44" cy="20" r="8" fill="none" stroke="#0f1115" stroke-width="2"/>
</svg>
